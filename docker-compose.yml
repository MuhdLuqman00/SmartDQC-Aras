services:
  postgres:
    image: postgres:16-alpine
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=64MB
      -c maintenance_work_mem=256MB
      -c effective_cache_size=2GB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartdqc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartdqc}
      POSTGRES_DB: ${POSTGRES_DB:-smartdqc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartdqc}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: luqmanzulkefli/smartdqc-api:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - WHO_ZSCORE_DIR=/app/data/zscore
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:4b}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartdqc}:${POSTGRES_PASSWORD:-smartdqc}@postgres/${POSTGRES_DB:-smartdqc}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: luqmanzulkefli/smartdqc-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:4b}
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama...' &&
        until curl -sf http://ollama:11434/api/tags; do sleep 3; done &&
        echo 'Pulling model: '$$OLLAMA_MODEL &&
        curl -s http://ollama:11434/api/pull -d '{\"name\":\"'$$OLLAMA_MODEL'\"}' &&
        echo 'Model ready.'
      "
    restart: on-failure

volumes:
  ollama_models:
  postgres_data:
