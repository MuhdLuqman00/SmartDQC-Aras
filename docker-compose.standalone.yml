# SmartDQC — standalone all-in-one image (Postgres + Ollama + API + frontend
# in one container). Mirrors the working manual run:
#
#   docker run -d -p 8000:8000 -p 8080:80 --name smartdqc \
#       luqmanzulkefli/smartdqc-standalone:v3.2-qwen35
#
# but lets you change the LLM model without editing this file — just edit the
# .env next to it (copy from .env.standalone.example) or pass it inline:
#
#   OLLAMA_MODEL=gemma4:e4b-it-qat docker compose -f docker-compose.standalone.yml up -d
#
# Whatever model you set is pulled by Ollama on startup, so it must be a valid
# Ollama tag (https://ollama.com/library), and the machine needs internet the first time
# that model is pulled.

services:
  smartdqc:
    image: luqmanzulkefli/smartdqc-standalone:v3.2-qwen35
    container_name: smartdqc
    ports:
      - "8000:8000"   # backend API
      - "8080:80"     # web UI  ->  open http://localhost:8080
    environment:
      # ── The knob you wanted: change the model here (or in .env) ──────────
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e4b-it-qat}
      # Keep the model resident (no post-idle unload/CPU fallback); "-1" =
      # forever; use a duration like "30m" only on a shared GPU.
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}
      # Gemma 4 e4b is non-reasoning; OLLAMA_THINK has no effect.
      - OLLAMA_THINK=${OLLAMA_THINK:-false}
      # Cap the context window. Reasoning models default to a huge (128K+)
      # context, so Ollama preallocates a multi-GB KV cache that dwarfs the
      # ~4.5GB model. SmartDQC prompts are small, so 8192 is plenty and frees
      # VRAM to keep the model 100% on an 8GB GPU.
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-8192}
    volumes:
      # Persist pulled models + the database across `down`/`up` so switching
      # back to an already-pulled model is instant and data survives restarts.
      # The model is NOT baked into the image — on first boot Ollama pulls
      # OLLAMA_MODEL from the Ollama registry into this volume (needs internet once).
      - ollama_models:/root/.ollama
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

    # ── NVIDIA GPU acceleration enabled ─────────────────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_models:
  postgres_data:
